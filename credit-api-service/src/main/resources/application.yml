server:
  port: 8080

spring:
  application:
    name: credit-api-service

  datasource:
    url: jdbc:postgresql://localhost:5432/creditdb
    username: credit_user
    password: credit_pass
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

  kafka:
    bootstrap-servers: localhost:9092

  rabbitmq:
    host: localhost
    port: 5672
    username: credit_user
    password: credit_pass

rabbitmq:
  queue:
    decision: credit.decision.queue

logging:
  level:
    ru.netology: DEBUG
    org.springframework.kafka: INFO
    org.springframework.amqp: INFO
